<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - إدارة المهام</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span>📋 مدير المهام</span>
            </div>
            <div class="user-info">
                <span>مرحباً، <span id="userName"></span></span>
                <span id="userRole" class="role-badge"></span>
                <button id="logoutBtn" class="logout-btn">🚪 خروج</button>
            </div>
        </div>
    </nav>

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="stats-card">
                <h3>📊 الإحصائيات</h3>
                <div class="stat-item"><span>📋 إجمالي المهام</span><span id="statTotal">0</span></div>
                <div class="stat-item"><span>⏳ قيد الانتظار</span><span id="statPending">0</span></div>
                <div class="stat-item"><span>⚙️ قيد التنفيذ</span><span id="statInProgress">0</span></div>
                <div class="stat-item"><span>✅ مكتملة</span><span id="statCompleted">0</span></div>
                <div class="stat-item"><span>⚠️ متأخرة</span><span id="statOverdue">0</span></div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill">0%</div>
                </div>
                <div style="text-align:center; margin-top:5px;">نسبة الإنجاز: <span id="completionRate">0</span>%</div>
            </div>

            <div class="filter-card">
                <h3>🔍 تصفية المهام</h3>
                <select id="filterStatus">
                    <option value="all">جميع المهام</option>
                    <option value="pending">قيد الانتظار</option>
                    <option value="in_progress">قيد التنفيذ</option>
                    <option value="completed">مكتملة</option>
                </select>
                <select id="filterPriority">
                    <option value="all">جميع الأولويات</option>
                    <option value="high">عالية</option>
                    <option value="medium">متوسطة</option>
                    <option value="low">منخفضة</option>
                </select>
            </div>
        </aside>

        <main class="main-content">
            <div class="add-task-card">
                <h3>➕ إضافة مهمة جديدة</h3>
                <form id="addTaskForm" class="task-form">
                    <input type="text" id="taskTitle" placeholder="عنوان المهمة" required>
                    <textarea id="taskDesc" placeholder="وصف المهمة" rows="2"></textarea>
                    <select id="taskPriority">
                        <option value="low">منخفضة</option>
                        <option value="medium" selected>متوسطة</option>
                        <option value="high">عالية</option>
                    </select>
                    <input type="date" id="taskDueDate">
                    <button type="submit">➕ إضافة</button>
                </form>
            </div>

            <div class="tasks-container">
                <h3>📝 قائمة المهام</h3>
                <div id="tasksList" class="tasks-list">
                    <div class="loading">جاري التحميل...</div>
                </div>
            </div>
        </main>
    </div>

    <!-- نافذة تعديل المهمة -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>✏️ تعديل المهمة</h3>
                <span class="close">&times;</span>
            </div>
            <form id="editTaskForm">
                <input type="hidden" id="editTaskId">
                <div class="form-group">
                    <label>عنوان المهمة</label>
                    <input type="text" id="editTitle" required>
                </div>
                <div class="form-group">
                    <label>الوصف</label>
                    <textarea id="editDesc" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>الحالة</label>
                    <select id="editStatus">
                        <option value="pending">قيد الانتظار</option>
                        <option value="in_progress">قيد التنفيذ</option>
                        <option value="completed">مكتملة</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>الأولوية</label>
                    <select id="editPriority">
                        <option value="low">منخفضة</option>
                        <option value="medium">متوسطة</option>
                        <option value="high">عالية</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>تاريخ الاستحقاق</label>
                    <input type="date" id="editDueDate">
                </div>
                <button type="submit" class="btn-save">💾 حفظ التغييرات</button>
            </form>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <script src="js/app.js"></script>
</body>
</html>
