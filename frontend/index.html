<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - نظام إدارة المهام</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- بطاقة تسجيل الدخول -->
        <div class="auth-card" id="loginCard">
            <div class="auth-header">
                <h1>📋 نظام إدارة المهام</h1>
                <p>سجل دخولك لإدارة مهامك</p>
            </div>
            
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="loginEmail" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="loginPassword" placeholder="********" required>
                </div>
                <button type="submit" class="btn-primary">تسجيل الدخول</button>
            </form>
            
            <p class="auth-footer">
                ليس لديك حساب؟ <a href="#" id="showRegister">إنشاء حساب جديد</a>
            </p>
        </div>

        <!-- بطاقة التسجيل -->
        <div class="auth-card" id="registerCard" style="display: none;">
            <div class="auth-header">
                <h1>📝 إنشاء حساب جديد</h1>
                <p>قم بإنشاء حساب للبدء</p>
            </div>
            
            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label>الاسم الكامل</label>
                    <input type="text" id="regName" placeholder="أحمد محمد" required>
                </div>
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="regEmail" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="regPassword" placeholder="********" required>
                </div>
                <div class="form-group">
                    <label>تأكيد كلمة المرور</label>
                    <input type="password" id="regPasswordConfirmation" placeholder="********" required>
                </div>
                <button type="submit" class="btn-primary">إنشاء حساب</button>
            </form>
            
            <p class="auth-footer">
                لديك حساب؟ <a href="#" id="showLogin">تسجيل الدخول</a>
            </p>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <script src="js/app.js"></script>
</body>
</html>
